{% extends 'menu/base.html' %}

{% block title %}Delete Menu Item | QR Digital Menu{% endblock %}

{% block content %}
<nav class="admin-navbar">
    <div class="admin-brand"><i class="fa-solid fa-mug-hot"></i> Shop Admin</div>
    <div class="admin-nav-links">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'category_list' %}">Categories</a>
        <a href="{% url 'item_list' %}" style="font-weight: bold; border-bottom: 2px solid white; padding-bottom: 3px;">Menu Items</a>
        <a href="{% url 'settings_edit' %}">Settings</a>
        <a href="{% url 'logout' %}" onclick="return confirm('Do you want to logout now?');" style="color: #ffcccc;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </div>
</nav>

<div class="panel">
    <h2>Are you sure?</h2>
    <p style="margin: 20px 0; color: var(--text-muted);">
        Are you sure you want to delete the menu item "<strong>{{ item.name }}</strong>"?
    </p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete Item</button>
        <a href="{% url 'item_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
